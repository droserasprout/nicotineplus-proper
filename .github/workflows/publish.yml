name: Build and publish image

# Builds image for two Ubuntu bases, each as a multi-arch (amd64+arm64)
# manifest. UBUNTU_VERSION selects the base, and the Dockerfile derives the
# matching Broadway GTK fork .deb from it. Tags: 2404 + 2604; latest tracks 2604.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        base:
          - { ubuntu: "24.04", tag: "2404", latest: "false", tag_suffix: "-2404" }
          - { ubuntu: "26.04", tag: "2604", latest: "true",  tag_suffix: "" }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=${{ matrix.base.latest }}
          tags: |
            type=raw,value=${{ matrix.base.tag }}
            type=ref,event=tag,suffix=${{ matrix.base.tag_suffix }}

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: fork
          platforms: linux/amd64,linux/arm64
          build-args: |
            UBUNTU_VERSION=${{ matrix.base.ubuntu }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # Offline UI-preview image with the demodata plugin baked in; 4.22 base only.
      - name: Build and push :demo (4.22 only)
        if: matrix.base.ubuntu == '26.04'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: demo
          platforms: linux/amd64,linux/arm64
          build-args: |
            UBUNTU_VERSION=${{ matrix.base.ubuntu }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:demo
          labels: ${{ steps.meta.outputs.labels }}
